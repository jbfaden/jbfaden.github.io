<html>

  <body>
          <section class="visualization">
        <div class="controls">
          <div class="control-group">
            <label for="start-date">From</label>
            <input type="date" id="start-date" />
            <label for="end-date">To</label>
            <input type="date" id="end-date" />
            <button id="apply-btn">Apply</button>
          </div>
          <div class="control-group">
            <button class="preset-btn" data-years="1">1 year</button>
            <button class="preset-btn" data-years="3">3 years</button>
            <button class="preset-btn" data-years="11">11 years</button>
            <button class="preset-btn" data-years="25">25 years</button>
          </div>
        </div>

        <div id="plot"></div>
      </section>
    </body>
</html>
